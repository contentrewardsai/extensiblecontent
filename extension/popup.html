<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      body {
        width: 320px;
        padding: 16px;
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 14px;
      }
      h1 { font-size: 16px; margin: 0 0 12px; }
      .status { margin-bottom: 12px; color: #666; }
      .user { font-weight: 500; color: #333; }
      .badge { font-size: 11px; padding: 2px 6px; background: #22c55e; color: white; border-radius: 4px; }
      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
      }
      .btn-primary { background: #2563eb; color: white; }
      .btn-primary:hover { background: #1d4ed8; }
      .btn-outline { background: transparent; border: 1px solid #ccc; color: #333; }
      .btn-outline:hover { background: #f3f4f6; }
      .hidden { display: none; }
    </style>
  </head>
  <body>
    <h1>Extensible Content</h1>
    <div id="logged-out">
      <p class="status">Sign in to connect the extension to your Whop account.</p>
      <button id="login-btn" class="btn-primary">Login with Whop</button>
    </div>
    <div id="logged-in" class="hidden">
      <p class="status"><span class="user" id="user-email">—</span> <span class="badge">PRO</span></p>
      <button id="social-btn" class="btn-primary" style="margin-bottom: 8px;">Post to GoHighLevel</button>
      <button id="logout-btn" class="btn-outline">Log out</button>
    </div>
    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
